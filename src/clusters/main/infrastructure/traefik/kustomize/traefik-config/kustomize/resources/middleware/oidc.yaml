# Create OIDC middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc
spec:
  plugin:
    traefikoidc:
      allowedClaims:
        - sub
        - traits
      allowOpaqueTokens: true
      backchannelLogoutURL: /auth/logout/backchannel
      callbackURL: /auth/callback
      clientAuthMethod: client_secret_basic
      clientID: traefik
      clientSecret: urn:k8s:secret:$(TRAEFIK_CONFIG_SECRETS_OIDC):client-secret
      cookieDomain: spietras.dev
      cookiePrefix: __Http-traefik-oidc-
      enableBackchannelLogout: true
      enableFrontchannelLogout: true
      enablePKCE: true
      frontchannelLogoutURL: /auth/logout/frontchannel
      # yamllint disable rule:line-length
      headers:
        - name: X-User-ID
          value: '{{ .Claims.sub | default "" }}'
        - name: X-User-Traits-Locales-Preferred
          value: '{{ ((.Claims.traits).locales).preferred | default "" }}'
        - name: X-User-Traits-Names-Display
          value: '{{ ((.Claims.traits).names).display | default "" }}'
        - name: X-User-Traits-Pictures-Profile-URL
          value: '{{ (((.Claims.traits).pictures).profile).url | default "" }}'
      # yamllint enable rule:line-length
      logLevel: debug
      logoutURL: /auth/logout
      maxRefreshTokenAgeSeconds: 2592000
      minimalHeaders: true
      overrideScopes: true
      postLogoutRedirectURI: /
      providerURL: https://scorpion.k8s.spietras.dev
      redis:
        address: dragonfly.traefik.svc.cluster.local:6379
        enabled: true
        enableCircuitBreaker: true
        enableHealthCheck: true
        keyPrefix: "traefik:oidc:"
        password: urn:k8s:secret:$(TRAEFIK_CONFIG_SECRETS_OIDC):dragonfly-password
      refreshGracePeriodSeconds: 600
      requireTokenIntrospection: false
      scopes:
        - openid
        - profile
        - offline_access
      sessionEncryptionKey: urn:k8s:secret:$(TRAEFIK_CONFIG_SECRETS_OIDC):session-encryption-key
      sessionMaxAge: 2592000
      strictAudienceValidation: true
      stripAuthCookies: true
      userIdentifierClaim: sub
