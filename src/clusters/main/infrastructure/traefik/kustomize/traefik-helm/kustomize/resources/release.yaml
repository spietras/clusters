# Create traefik Helm release
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  chart:
    spec:
      # Use this chart from the repository
      chart: traefik
      # Pin version to major
      version: "37.x"
      # Use this Helm repository
      sourceRef:
        kind: HelmRepository
        name: traefik
  # This key always needs to be here for patching to work
  postRenderers: []
  values:
    # Experimental features
    experimental:
      # Plugins
      plugins:
        # OIDC plugin
        traefikoidc:
          moduleName: github.com/lukaszraczylo/traefikoidc
          version: v1.0.10
    # Use Traefik v3.6
    image:
      tag: "v3.6"
    # Logging
    logs:
      access:
        # Enable access logs
        enabled: true
      general:
        # Set log level to DEBUG
        level: DEBUG
    # Disable Prometheus metrics
    metrics:
      prometheus: null
    # Entrypoints
    ports:
      # Disable default ports
      web: null
      websecure: null
      metrics: null
      # Port for HTTP traffic
      http:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 80
        # HTTP traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 8000
        # Redirect to HTTPS
        redirections:
          entryPoint:
            to: https
            scheme: https
      # Port for HTTPS traffic
      https:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 443
        # Secure web traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 8443
        # Enable TLS
        tls:
          enabled: true
      # Port for TLS over TCP traffic
      tls-tcp:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 10000
        # TCP traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 10000
        # Enable TLS
        tls:
          enabled: true
      # Port for dingo SRT traffic
      dingo-srt:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9999
        # dingo SRT traffic uses UDP
        protocol: UDP
        # Port to use inside the cluster
        port: 9999
      # Port for graphite SQL traffic
      graphite-sql:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9998
        # graphite SQL traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 9998
      # Port for loris RTP traffic
      loris-rtp:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9997
        # loris RTP traffic uses UDP
        protocol: UDP
        # Port to use inside the cluster
        port: 9997
      # Port for octopus SRT traffic
      octopus-srt:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9996
        # octopus SRT traffic uses UDP
        protocol: UDP
        # Port to use inside the cluster
        port: 9996
      # Port for sapphire SQL traffic
      sapphire-sql:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9995
        # sapphire SQL traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 9995
      # Port for diamond SQL traffic
      diamond-sql:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9994
        # diamond SQL traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 9994
      # Port for obsidian SQL traffic
      obsidian-sql:
        # Expose it outside the cluster
        expose:
          default: true
        # Expose it on this port
        exposedPort: 9993
        # obsidian SQL traffic uses TCP
        protocol: TCP
        # Port to use inside the cluster
        port: 9993
    providers:
      kubernetesCRD:
        # Allow cross-namespace references in resources
        allowCrossNamespace: true
    service:
      annotations:
        # Use custom machine name in Tailscale
        tailscale.com/hostname: traefik
      # Use Tailscale LoadBalancer
      loadBalancerClass: tailscale
