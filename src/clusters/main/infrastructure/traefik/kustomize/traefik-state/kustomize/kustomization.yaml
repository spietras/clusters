# Create traefik-state Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Include the following configuration files
configurations:
  - configurations/names.yaml
# Include the following resources
resources:
  - resources/dragonfly/release.yaml
  - resources/dragonfly/repository.yaml
# Generate secrets
secretGenerator:
  - files:
      - password=secrets/dragonfly/password
    name: traefik-state-secrets-dragonfly
