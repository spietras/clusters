# Create HTTP ingress route for flux
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flux-http
spec:
  entryPoints:
    # Use entrypoint for HTTPS traffic
    - https
  routes:
    # Match traffic with the Host header
    - match: HostRegexp(`flux\..*`)
      kind: Rule
      services:
        # Route traffic to the flux-operator service
        - name: flux-operator
          # This is the name of the port in the service
          port: http-web
