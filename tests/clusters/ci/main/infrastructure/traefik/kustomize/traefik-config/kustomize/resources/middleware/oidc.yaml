# Create OIDC middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc
spec:
  plugin:
    traefikoidc:
      callbackURL: /auth/callback
      clientID: traefik
      clientSecret: secret
      enableFrontchannelLogout: true
      frontchannelLogoutURL: /auth/logout/frontchannel
      providerURL: https://example.com
      sessionEncryptionKey: XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
